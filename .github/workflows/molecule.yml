---
name: molecule

on: [push, pull_request]  # yamllint disable-line rule:truthy

jobs:
  molecule:
    name: Molecule [${{ matrix.distro }}] [${{ matrix.scenario }}]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        distro:
          - ubuntu2604
          - debian13
        scenario:
          - default
      fail-fast: false

    env:
      MOLECULE_DISTRO: ${{ matrix.distro }}
      PY_COLORS: "1"
      ANSIBLE_FORCE_COLOR: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: anonymousoverflow

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: anonymousoverflow/.python-version
          cache: pip
          cache-dependency-path: anonymousoverflow/molecule/requirements.txt

      - name: Install Python dependencies
        working-directory: anonymousoverflow
        run: pip install -r molecule/requirements.txt

      - name: Cache Ansible collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('anonymousoverflow/molecule/default/requirements.yml') }}

      - name: Install Ansible roles
        working-directory: anonymousoverflow
        run: ansible-galaxy role install -r molecule/default/requirements.yml

      - name: Install Ansible collections
        working-directory: anonymousoverflow
        run: ansible-galaxy collection install -r molecule/default/requirements.yml

      - name: Run molecule
        working-directory: anonymousoverflow
        run: molecule test --scenario-name ${{ matrix.scenario }}
